# CodeSense — Legacy Vue 2.7 混合项目配置
#
# 适用于: Vue 2.7 + vue-demi + vuex/pinia 混用 + vue-router
#
# 用法: codesense index -c codesense.legacy.yaml

project:
  name: "legacy-app"
  source_root: "src"

entities:
  component:
    patterns:
      - "**/*.vue"
    properties:
      - name: "name"
        extract: "export_default.name"
      - name: "api_mode"
        extract: "detect_api_mode"

  store:
    patterns:
      - "src/store/**/*.ts"
      - "src/stores/**/*.ts"
    variants:
      pinia:
        detector: call_expression
        pattern: "defineStore"
        internal_structure:
          state: "options.state"
          getters: "options.getters"
          actions: "options.actions"
      vuex:
        detector: new_expression
        pattern: "Vuex.Store"
        internal_structure:
          state: "options.modules.*.state"
          getters: "options.modules.*.getters"
          mutations: "options.modules.*.mutations"
          actions: "options.modules.*.actions"

  route:
    patterns:
      - "src/router/**/*.ts"
      - "src/router/**/*.js"

framework_apis:
  - name: "vue"
    sources:
      - "vue"
      - "vue-demi"
    api_list:
      - "ref"
      - "computed"
      - "watch"
      - "onMounted"
      - "onUnmounted"
      - "reactive"
      - "toRefs"
      - "nextTick"
      - "watchEffect"
      - "provide"
      - "inject"

relationships:
  imports:
    description: "File-level import dependency"
    from: "component"
    to: "store"

  uses_store:
    description: "Component uses a store (pinia or vuex)"
    from: "component"
    to: "store"
    detect_by:
      - type: "call_expression"
        pattern: "use*Store"
      - type: "call_expression"
        pattern: "mapState"
      - type: "call_expression"
        pattern: "mapActions"
      - type: "call_expression"
        pattern: "mapGetters"
      - type: "call_expression"
        pattern: "mapMutations"
      - type: "member_expression"
        pattern: "$store.*"

  matches_route:
    description: "Route maps to component"
    from: "route"
    to: "component"
    detect_by:
      - type: "import_expression"
        pattern: "*"

custom_entities:
  legacy_module:
    description: "Vue 2.7 老模块，尚未迁移到 Vue 3"
    patterns:
      - "src/**/*.vue"
    markers:
      - uses_options_api: true
      - import_contains: "vuex"
