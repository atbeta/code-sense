project:
  name: "test-fixture"
  source_root: "test-fixtures/src"

entities:
  component:
    patterns:
      - "**/*.vue"

  store:
    patterns:
      - "test-fixtures/src/store/**/*.ts"
      - "test-fixtures/src/store/**/*.js"

  route:
    patterns:
      - "test-fixtures/src/router/**/*.ts"

framework_apis:
  - name: "vue"
    sources:
      - "vue"
    api_list:
      - "ref"
      - "computed"
      - "watch"
      - "onMounted"
  - name: "vuex"
    sources:
      - "vuex"
    api_list:
      - "mapState"
      - "mapMutations"
      - "mapActions"
      - "mapGetters"

relationships:
  imports:
    description: "File-level import dependency"
    from: "component"
    to: "store"

  uses_store:
    description: "Component uses a store (Pinia or Vuex)"
    from: "component"
    to: "store"
    detect_by:
      - type: "call_expression"
        pattern: "use*Store"
      - type: "call_expression"
        pattern: "mapState"
      - type: "call_expression"
        pattern: "mapMutations"
      - type: "call_expression"
        pattern: "mapActions"
      - type: "call_expression"
        pattern: "mapGetters"
      - type: "member_expression"
        pattern: "$store.*"

  matches_route:
    description: "Route maps to component"
    from: "route"
    to: "component"
    detect_by:
      - type: "import_expression"
        pattern: "*"

custom_entities: {}
