name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@code-sense'

      - name: Match tag to package.json version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(jq -r .version package.json)"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Git tag version ($TAG_VER) must equal package.json version ($PKG_VER). Bump version, commit, then tag and push."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
